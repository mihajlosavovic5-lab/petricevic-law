<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Stranica nije pronađena · Advokat Ana Petričević</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23f5f0e8'/><rect x='2' y='2' width='96' height='96' fill='none' stroke='%23b8975a' stroke-width='4'/><text x='50' y='68' font-family='Georgia,serif' font-size='54' font-weight='700' fill='%231a1a1a' text-anchor='middle'>A<tspan fill='%23b8975a'>P</tspan></text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #f5f0e8;
      --gold: #b8975a;
      --dark: #1a1a1a;
      --text-light: #6b6b6b;
    }
    body {
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      font-family: 'Montserrat', sans-serif;
    }
    .monogram {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--dark);
      letter-spacing: -0.02em;
      margin-bottom: 48px;
      opacity: 0.18;
    }
    .monogram span { color: var(--gold); }
    .num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 700;
      color: var(--dark);
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }
    .num span { color: var(--gold); }
    .divider {
      width: 48px; height: 1px;
      background: var(--gold);
      margin: 24px auto;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 14px;
    }
    p {
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--text-light);
      line-height: 1.7;
      max-width: 360px;
      margin-bottom: 40px;
    }
    a {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      color: white;
      background: var(--gold);
      padding: 14px 36px;
      transition: background 0.3s, transform 0.25s;
    }
    a:hover { background: #9e7c3f; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="monogram">A<span>P</span></div>
  <div class="num">4<span>0</span>4</div>
  <div class="divider"></div>
  <h1>Stranica nije pronađena</h1>
  <p>Tražena stranica ne postoji ili je premeštena. Možete se vratiti na početnu stranicu.</p>
  <a href="/petricevic-law/">Povratak na početnu</a>
</body>
</html>
